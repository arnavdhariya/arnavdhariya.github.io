- name: "Simulated Annealing Haplotype Aligner (SAHap)"
  summary: "A C++ haplotype assembly tool that uses simulated annealing and super-read strategies to reduce weighted mismatch error and improve reconstruction quality."
  tags: "C++, Algorithms, Computational Biology, Optimization"
  affiliation: "Dr. Wayne Hayes Research Group @ UCI"
  period: "Sep 2024 - Sep 2025"
  detail: "Led the simulated annealing-based haplotype assembly project as a freshman researcher, implemented local optimization strategies (including simulated annealing and hill climbing), and presented the work at the UCI Undergraduate Research Symposium."
