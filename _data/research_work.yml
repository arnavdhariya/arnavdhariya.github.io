- name: "Privacy-Preserving Deletion Benchmarking Pipeline"
  summary: "Python and MySQL-backed experimental pipeline for evaluating differential privacy and ILP-based deletion mechanisms under Right-to-Be-Forgotten settings across UCI ML datasets."
  tags: "Python, MySQL, Differential Privacy, ILP"
  affiliation: "Mehrotra Lab (Sharad's Lab) @ UCI"
  period: "Aug 2025 - Present"
  detail: "Designed and implemented deletion mechanisms, evaluated RTBF guarantees through controlled studies, and built a reproducible benchmarking framework for deletion efficiency and leakage analysis in collaboration toward a VLDB submission."
